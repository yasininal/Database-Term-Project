{% extends "base.html" %}

{% block title %}Edit Listing - Airbnb Clone{% endblock %}

{% block content %}
<a href="{{ url_for('host_properties') }}" class="btn-back"><i class="fa-solid fa-chevron-left"></i> Go Back</a>

<div class="auth-container" style="max-width: 600px;">
    <h1>Edit Listing</h1>
    <p style="color: var(--text-light); margin-bottom: 24px;">Update property information.</p>
    
    <form action="{{ url_for('edit_property', id=property.property_id) }}" method="POST">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" name="title" id="title" value="{{ property.title }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea name="description" id="description" rows="5" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 16px;" required>{{ property.description }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="base_price">Nightly Price (₺)</label>
            <input type="number" name="base_price" id="base_price" value="{{ property.base_price }}" required>
        </div>

        <div class="form-group" style="margin-top: 24px;">
            <label style="margin-bottom: 12px; display: block; font-weight: 600;">Offered Amenities</label>
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #eee;">
                {% for am in all_amenities %}
                <label style="display: flex; align-items: center; gap: 8px; font-weight: 500; cursor: pointer; font-size: 14px; color: #484848;">
                    <input type="checkbox" name="amenities" value="{{ am.amenity_id }}" 
                           style="width: 18px; height: 18px; accent-color: #ff385c; cursor: pointer;"
                           {% if am.amenity_id in current_amenity_ids %}checked{% endif %}>
                    <i class="fa-solid {{ am.icon }}" style="width: 20px; text-align: center; color: #222;"></i> 
                    <span>{{ am.name }}</span>
                </label>
                {% endfor %}
            </div>
        </div>
        
        <div style="margin-top: 24px; display: flex; gap: 12px;">
            <button type="submit" class="btn-block">Save Changes</button>
            <a href="{{ url_for('host_properties') }}" class="host-link" style="border: 1px solid var(--border); padding: 12px; flex: 1; text-align: center; text-decoration: none;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
