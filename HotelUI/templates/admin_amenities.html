{% extends "base.html" %}

{% block title %}Amenity Management - Admin{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <div class="breadcrumb">
            <a href="{{ url_for('admin_dashboard') }}">Admin</a> / Amenities
        </div>
        <h1>Amenity Management</h1>
    </div>

    <div class="admin-grid-layout">
        <div class="admin-card shadow-sm">
            <h3>Add New Amenity</h3>
            <form action="{{ url_for('admin_amenities') }}" method="POST" class="admin-form">
                <div class="form-group">
                    <label>Amenity Name</label>
                    <input type="text" name="name" placeholder="e.g., Heated Pool" required>
                </div>
                <div class="form-group">
                    <label>FontAwesome Icon Class</label>
                    <input type="text" name="icon" placeholder="e.g., fa-swimming-pool" required>
                </div>
                <button type="submit" class="btn btn-primary">Add</button>
            </form>
        </div>

        <div class="table-container shadow-sm">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Icon</th>
                        <th>Name</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for amenity in amenities %}
                    <tr>
                        <td><i class="fa-solid {{ amenity.icon }}"></i></td>
                        <td>{{ amenity.name }}</td>
                        <td>
                            <form action="{{ url_for('delete_amenity', id=amenity.amenity_id) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this amenity?')">
                                <button type="submit" class="btn-delete"><i class="fa-solid fa-trash"></i></button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<style>
    .admin-container { padding: 2rem 0; }
    .breadcrumb { color: #717171; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .breadcrumb a { color: #007bff; text-decoration: none; }
    
    .admin-grid-layout { display: grid; grid-template-columns: 350px 1fr; gap: 2rem; }
    
    .admin-card { background: white; padding: 1.5rem; border-radius: 12px; height: fit-content; }
    .admin-card h3 { margin-bottom: 1.5rem; font-size: 1.2rem; }

    .admin-form .form-group { margin-bottom: 1rem; }
    .admin-form label { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; color: #484848; }
    .admin-form input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; }

    .btn-primary { background: #ff385c; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 0.5rem; }
    .btn-primary:hover { background: #e31c5f; }

    .admin-table { width: 100%; border-collapse: collapse; background: white; }
    .admin-table th, .admin-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
    .admin-table td i { font-size: 1.2rem; color: #484848; }

    .btn-delete { background: none; border: none; color: #ff385c; cursor: pointer; font-size: 1rem; }
    .btn-delete:hover { color: #c13515; }

    @media (max-width: 992px) {
        .admin-grid-layout { grid-template-columns: 1fr; }
    }
</style>
{% endblock %}
