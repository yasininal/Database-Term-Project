{% extends "base.html" %}

{% block title %}Giriş Yap - Airbnb Clone{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Giriş yapın veya kaydolun</h2>
    <hr>
    <br>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="email">E-posta</label>
            <input type="email" name="email" id="email" placeholder="E-posta adresiniz" required>
        </div>

        <div class="form-group">
            <label for="password">Şifre</label>
            <input type="password" name="password" id="password" placeholder="********" required>
        </div>

        <button type="submit" class="btn-block">Giriş Yap</button>
    </form>

    <div class="demo-credentials">
        <h4>Demo Bilgileri</h4>
        <p><strong>Admin:</strong> admin@example.com / password123</p>
        <p><strong>Host:</strong> host@example.com / password123</p>
        <p><strong>Guest:</strong> guest@example.com / password123</p>
    </div>
    

</div>
{% endblock %}
