{% extends "base.html" %}

{% block title %}Yeni İlan Oluştur - Airbnb Clone{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 800px;">
    <div class="auth-header">
        <a href="{{ url_for('host_properties') }}" class="btn-back"><i class="fa-solid fa-chevron-left"></i> Vazgeç</a>
        <h1 style="margin-top: 24px;">Yeni İlan Oluştur</h1>
        <p>Evinizi sisteme kaydedin ve misafir ağırlamaya hemen başlayın.</p>
    </div>

    <form action="{{ url_for('add_property') }}" method="POST" class="card shadow-sm" style="padding: 32px; background: white; margin-top: 32px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <div class="form-group" style="grid-column: span 2;">
                <label>İlan Başlığı</label>
                <input type="text" name="title" placeholder="Örn: Boğaz Manzaralı Lüks Villa" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div class="form-group" style="grid-column: span 2;">
                <label>Açıklama</label>
                <textarea name="description" placeholder="Evinizin özelliklerini detaylıca yazın..." required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; height: 120px;"></textarea>
            </div>

            <div class="form-group">
                <label>Şehir</label>
                <input type="text" name="city" placeholder="İstanbul" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div class="form-group">
                <label>İlçe</label>
                <input type="text" name="district" placeholder="Beşiktaş" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div class="form-group">
                <label>Gecelik Fiyat (₺)</label>
                <input type="number" name="base_price" placeholder="1200" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div class="form-group">
                <label>Konut Tipi</label>
                <select name="property_type" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                    <option value="Apartment">Daire</option>
                    <option value="Villa">Villa</option>
                    <option value="Loft">Loft</option>
                    <option value="Cabin">Dağ Evi</option>
                </select>
            </div>

            <div class="form-group">
                <label>Maksimum Misafir</label>
                <input type="number" name="max_guests" value="2" min="1" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>
        </div>

        <div style="margin-top: 32px; display: flex; gap: 16px;">
            <button type="submit" class="btn-block" style="flex: 1; padding: 16px;">İlanı Yayınla</button>
            <a href="{{ url_for('host_properties') }}" style="flex: 1; text-align: center; padding: 16px; border: 1px solid #ddd; border-radius: 8px; text-decoration: none; color: #222;">Vazgeç</a>
        </div>
    </form>
</div>

<style>
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    .form-group input:focus, .form-group textarea:focus { border-color: #ff385c; outline: none; }
</style>
{% endblock %}
