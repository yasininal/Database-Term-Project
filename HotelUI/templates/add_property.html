{% extends "base.html" %}

{% block title %}Create New Listing - Rentogram{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 800px;">
    <div class="auth-header">
        <a href="{{ url_for('host_properties') }}" class="btn-back"><i class="fa-solid fa-chevron-left"></i> Cancel</a>
        <h1 style="margin-top: 24px;">Create New Listing</h1>
        <p>Register your property in the system and start hosting guests immediately.</p>
    </div>

    <form action="{{ url_for('add_property') }}" method="POST" class="card shadow-sm" style="padding: 32px; background: white; margin-top: 32px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <div class="form-group" style="grid-column: span 2;">
                <label>Listing Title</label>
                <input type="text" name="title" placeholder="e.g., Luxury Villa with Bosphorus View" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div class="form-group" style="grid-column: span 2;">
                <label>Description</label>
                <textarea name="description" placeholder="Write the features of your house in detail..." required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; height: 120px;"></textarea>
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" placeholder="Istanbul" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div class="form-group">
                <label>District</label>
                <input type="text" name="district" placeholder="Besiktas" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div class="form-group">
                <label>Nightly Price (₺)</label>
                <input type="number" name="base_price" placeholder="1200" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>

            <div class="form-group">
                <label>Property Type</label>
                <select name="property_type" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                    <option value="Apartment">Apartment</option>
                    <option value="Villa">Villa</option>
                    <option value="Loft">Loft</option>
                    <option value="Cabin">Cabin</option>
                </select>
            </div>

            <div class="form-group">
                <label>Maximum Guests</label>
                <input type="number" name="max_guests" value="2" min="1" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
            </div>
        </div>

        <div style="margin-top: 32px; display: flex; gap: 16px;">
            <button type="submit" class="btn-block" style="flex: 1; padding: 16px;">Publish Listing</button>
            <a href="{{ url_for('host_properties') }}" style="flex: 1; text-align: center; padding: 16px; border: 1px solid #ddd; border-radius: 8px; text-decoration: none; color: #222;">Cancel</a>
        </div>
    </form>
</div>

<style>
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    .form-group input:focus, .form-group textarea:focus { border-color: #ff385c; outline: none; }
</style>
{% endblock %}
